<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Aurora Flow — GPU Fluid Simulation</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #05060a;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
    cursor: crosshair;
  }
  .hud {
    position: fixed;
    top: 24px;
    left: 24px;
    color: rgba(255, 255, 255, 0.92);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: rgba(10, 12, 20, 0.45);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 14px;
    padding: 14px 18px;
    pointer-events: none;
    user-select: none;
    transition: opacity 1.2s ease;
  }
  .hud h1 {
    margin: 0 0 4px;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #7de2ff, #b58cff, #ff8bd1);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hud p {
    margin: 0;
    font-size: 12.5px;
    opacity: 0.75;
    line-height: 1.5;
  }
  .hud.faded { opacity: 0; }
  .sound-btn {
    position: fixed;
    top: 24px;
    right: 24px;
    color: rgba(255, 255, 255, 0.85);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    background: rgba(10, 12, 20, 0.45);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    padding: 9px 16px;
    cursor: pointer;
    user-select: none;
    transition: border-color 0.3s, color 0.3s, box-shadow 0.3s;
  }
  .sound-btn:hover { border-color: rgba(255, 255, 255, 0.35); }
  .sound-btn.active {
    color: #7de2ff;
    border-color: rgba(125, 226, 255, 0.5);
    box-shadow: 0 0 18px rgba(125, 226, 255, 0.25);
  }
  .stats {
    position: fixed;
    bottom: 18px;
    left: 24px;
    color: rgba(255, 255, 255, 0.55);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11.5px;
    letter-spacing: 0.06em;
    pointer-events: none;
    user-select: none;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
  }
  .error {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    color: #fff;
    font-family: sans-serif;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud">
  <h1>Aurora Flow</h1>
  <p>Two million particles riding a real-time fluid.<br>Move your cursor to stir it. Click for a burst.<br>Hit the 🎤 button and play some music.</p>
</div>
<button class="sound-btn" id="soundBtn">🎤 sound reactive: off</button>
<div class="stats" id="stats"></div>
<div class="error" id="err"><p>Sorry — this demo needs WebGL2 with float-texture support.</p></div>

<script>
'use strict';

const config = {
  SIM_RESOLUTION: 144,
  DYE_RESOLUTION: 1024,
  DENSITY_DISSIPATION: 0.55,
  VELOCITY_DISSIPATION: 0.25,
  PRESSURE: 0.8,
  PRESSURE_ITERATIONS: 20,
  CURL: 32,
  SPLAT_RADIUS: 0.22,
  SPLAT_FORCE: 6000,
  IDLE_SPLAT_INTERVAL: 1.6,
};

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, depth: false, stencil: false, antialias: false, preserveDrawingBuffer: false });

if (!gl || !gl.getExtension('EXT_color_buffer_float')) {
  document.getElementById('err').style.display = 'grid';
  throw new Error('WebGL2 float render targets unavailable');
}

function resizeCanvas() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(canvas.clientWidth * dpr);
  const h = Math.floor(canvas.clientHeight * dpr);
  // a hidden/backgrounded tab can report zero size; never rebuild buffers on it
  if (!w || !h || !Number.isFinite(w + h)) return false;
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
    return true;
  }
  return false;
}
resizeCanvas();

// ---------------------------------------------------------------- shaders

const VERT = `#version 300 es
precision highp float;
in vec2 aPosition;
out vec2 vUv, vL, vR, vT, vB;
uniform vec2 texelSize;
void main () {
  vUv = aPosition * 0.5 + 0.5;
  vL = vUv - vec2(texelSize.x, 0.0);
  vR = vUv + vec2(texelSize.x, 0.0);
  vT = vUv + vec2(0.0, texelSize.y);
  vB = vUv - vec2(0.0, texelSize.y);
  gl_Position = vec4(aPosition, 0.0, 1.0);
}`;

const FRAG_HEADER = `#version 300 es
precision highp float;
precision highp sampler2D;
in vec2 vUv, vL, vR, vT, vB;
out vec4 fragColor;
`;

const CLEAR_FRAG = FRAG_HEADER + `
uniform sampler2D uTexture;
uniform float value;
void main () {
  fragColor = value * texture(uTexture, vUv);
}`;

const SPLAT_FRAG = FRAG_HEADER + `
uniform sampler2D uTarget;
uniform float aspectRatio;
uniform vec3 color;
uniform vec2 point;
uniform float radius;
void main () {
  vec2 p = vUv - point;
  p.x *= aspectRatio;
  vec3 splat = exp(-dot(p, p) / radius) * color;
  vec3 base = texture(uTarget, vUv).xyz;
  fragColor = vec4(base + splat, 1.0);
}`;

const ADVECTION_FRAG = FRAG_HEADER + `
uniform sampler2D uVelocity;
uniform sampler2D uSource;
uniform vec2 texelSize;
uniform float dt;
uniform float dissipation;
void main () {
  vec2 coord = vUv - dt * texture(uVelocity, vUv).xy * texelSize;
  vec4 result = texture(uSource, coord);
  if (any(isnan(result)) || any(isinf(result))) { result = vec4(0.0); }
  float decay = 1.0 + dissipation * dt;
  fragColor = result / decay;
}`;

const DIVERGENCE_FRAG = FRAG_HEADER + `
uniform sampler2D uVelocity;
void main () {
  float L = texture(uVelocity, vL).x;
  float R = texture(uVelocity, vR).x;
  float T = texture(uVelocity, vT).y;
  float B = texture(uVelocity, vB).y;
  vec2 C = texture(uVelocity, vUv).xy;
  if (vL.x < 0.0) { L = -C.x; }
  if (vR.x > 1.0) { R = -C.x; }
  if (vT.y > 1.0) { T = -C.y; }
  if (vB.y < 0.0) { B = -C.y; }
  float div = 0.5 * (R - L + T - B);
  fragColor = vec4(div, 0.0, 0.0, 1.0);
}`;

const CURL_FRAG = FRAG_HEADER + `
uniform sampler2D uVelocity;
void main () {
  float L = texture(uVelocity, vL).y;
  float R = texture(uVelocity, vR).y;
  float T = texture(uVelocity, vT).x;
  float B = texture(uVelocity, vB).x;
  float vorticity = R - L - T + B;
  fragColor = vec4(0.5 * vorticity, 0.0, 0.0, 1.0);
}`;

const VORTICITY_FRAG = FRAG_HEADER + `
uniform sampler2D uVelocity;
uniform sampler2D uCurl;
uniform float curl;
uniform float dt;
void main () {
  float L = texture(uCurl, vL).x;
  float R = texture(uCurl, vR).x;
  float T = texture(uCurl, vT).x;
  float B = texture(uCurl, vB).x;
  float C = texture(uCurl, vUv).x;
  vec2 force = 0.5 * vec2(abs(T) - abs(B), abs(R) - abs(L));
  force /= length(force) + 0.0001;
  force *= curl * C;
  force.y *= -1.0;
  vec2 velocity = texture(uVelocity, vUv).xy;
  velocity += force * dt;
  velocity = clamp(velocity, vec2(-1000.0), vec2(1000.0));
  fragColor = vec4(velocity, 0.0, 1.0);
}`;

const PRESSURE_FRAG = FRAG_HEADER + `
uniform sampler2D uPressure;
uniform sampler2D uDivergence;
void main () {
  float L = texture(uPressure, vL).x;
  float R = texture(uPressure, vR).x;
  float T = texture(uPressure, vT).x;
  float B = texture(uPressure, vB).x;
  float divergence = texture(uDivergence, vUv).x;
  float pressure = (L + R + B + T - divergence) * 0.25;
  fragColor = vec4(pressure, 0.0, 0.0, 1.0);
}`;

const GRADIENT_SUBTRACT_FRAG = FRAG_HEADER + `
uniform sampler2D uPressure;
uniform sampler2D uVelocity;
void main () {
  float L = texture(uPressure, vL).x;
  float R = texture(uPressure, vR).x;
  float T = texture(uPressure, vT).x;
  float B = texture(uPressure, vB).x;
  vec2 velocity = texture(uVelocity, vUv).xy;
  velocity.xy -= vec2(R - L, T - B);
  velocity = clamp(velocity, vec2(-2000.0), vec2(2000.0));
  if (any(isnan(velocity)) || any(isinf(velocity))) { velocity = vec2(0.0); }
  fragColor = vec4(velocity, 0.0, 1.0);
}`;

const DISPLAY_FRAG = FRAG_HEADER + `
uniform sampler2D uTexture;
void main () {
  vec3 c = texture(uTexture, vUv).rgb;
  // gentle filmic-ish lift so bright cores glow without clipping harshly
  c = c / (1.0 + dot(c, vec3(0.30, 0.59, 0.11)) * 0.35);
  c = pow(max(c, 0.0), vec3(0.92));
  // subtle vignette
  vec2 d = vUv - 0.5;
  c *= 1.0 - 0.35 * dot(d, d);
  fragColor = vec4(c, 1.0);
}`;

const PARTICLE_UPDATE_FRAG = FRAG_HEADER + `
uniform sampler2D uParticles;
uniform sampler2D uVelocity;
uniform vec2 uVelTexel;
uniform float dt;
uniform float time;
float hash (vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
}
void main () {
  ivec2 coord = ivec2(gl_FragCoord.xy);
  vec4 p = texelFetch(uParticles, coord, 0);
  vec2 pos = p.xy;
  float age = p.z;
  float seed = p.w;
  vec2 vel = clamp(texture(uVelocity, pos).xy, vec2(-3000.0), vec2(3000.0));
  pos += vel * uVelTexel * dt;
  age += dt;
  float life = 3.0 + 7.0 * fract(seed * 7.31);
  bool corrupt = any(isnan(pos)) || any(isinf(pos));
  if (corrupt || age > life || pos.x < -0.01 || pos.x > 1.01 || pos.y < -0.01 || pos.y > 1.01) {
    pos = vec2(hash(vec2(seed, time)), hash(vec2(time * 1.37, seed + 4.7)));
    age = 0.0;
  }
  fragColor = vec4(pos, age, seed);
}`;

const PARTICLE_RENDER_VERT = `#version 300 es
precision highp float;
uniform sampler2D uParticles;
uniform sampler2D uDye;
uniform int uTexWidth;
uniform float uPointSize;
out vec3 vColor;
void main () {
  ivec2 coord = ivec2(gl_VertexID % uTexWidth, gl_VertexID / uTexWidth);
  vec4 p = texelFetch(uParticles, coord, 0);
  vec3 dyeColor = textureLod(uDye, p.xy, 0.0).rgb;
  float fadeIn = smoothstep(0.0, 0.6, p.z);
  vColor = (dyeColor * 0.55 + vec3(0.012, 0.02, 0.045)) * fadeIn;
  gl_Position = vec4(p.xy * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = uPointSize;
}`;

const PARTICLE_RENDER_FRAG = `#version 300 es
precision highp float;
in vec3 vColor;
out vec4 fragColor;
void main () {
  fragColor = vec4(vColor, 1.0);
}`;

// ---------------------------------------------------------------- GL helpers

function compileShader(type, source) {
  const shader = gl.createShader(type);
  gl.shaderSource(shader, source);
  gl.compileShader(shader);
  if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(shader));
  }
  return shader;
}

const vertexShader = compileShader(gl.VERTEX_SHADER, VERT);

class Program {
  constructor(fragSource, vertSource) {
    this.program = gl.createProgram();
    gl.attachShader(this.program, vertSource ? compileShader(gl.VERTEX_SHADER, vertSource) : vertexShader);
    gl.attachShader(this.program, compileShader(gl.FRAGMENT_SHADER, fragSource));
    gl.bindAttribLocation(this.program, 0, 'aPosition');
    gl.linkProgram(this.program);
    if (!gl.getProgramParameter(this.program, gl.LINK_STATUS)) {
      throw new Error(gl.getProgramInfoLog(this.program));
    }
    this.uniforms = {};
    const count = gl.getProgramParameter(this.program, gl.ACTIVE_UNIFORMS);
    for (let i = 0; i < count; i++) {
      const name = gl.getActiveUniform(this.program, i).name;
      this.uniforms[name] = gl.getUniformLocation(this.program, name);
    }
  }
  bind() { gl.useProgram(this.program); }
}

const clearProgram = new Program(CLEAR_FRAG);
const splatProgram = new Program(SPLAT_FRAG);
const advectionProgram = new Program(ADVECTION_FRAG);
const divergenceProgram = new Program(DIVERGENCE_FRAG);
const curlProgram = new Program(CURL_FRAG);
const vorticityProgram = new Program(VORTICITY_FRAG);
const pressureProgram = new Program(PRESSURE_FRAG);
const gradientSubtractProgram = new Program(GRADIENT_SUBTRACT_FRAG);
const displayProgram = new Program(DISPLAY_FRAG);
const particleUpdateProgram = new Program(PARTICLE_UPDATE_FRAG);
const particleRenderProgram = new Program(PARTICLE_RENDER_FRAG, PARTICLE_RENDER_VERT);

// fullscreen quad
const quadVao = gl.createVertexArray();
gl.bindVertexArray(quadVao);
const quadBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuffer);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
gl.enableVertexAttribArray(0);
gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

function blit(target) {
  if (target == null) {
    gl.viewport(0, 0, canvas.width, canvas.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  } else {
    gl.viewport(0, 0, target.width, target.height);
    gl.bindFramebuffer(gl.FRAMEBUFFER, target.fbo);
  }
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function createFBO(w, h, internalFormat, format, type, filter) {
  const texture = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, w, h, 0, format, type, null);

  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  gl.clearColor(0, 0, 0, 1);
  gl.clear(gl.COLOR_BUFFER_BIT);

  return {
    texture, fbo, width: w, height: h,
    texelSizeX: 1 / w, texelSizeY: 1 / h,
    attach(unit) {
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      return unit;
    },
  };
}

function createDoubleFBO(w, h, internalFormat, format, type, filter) {
  return {
    width: w, height: h,
    texelSizeX: 1 / w, texelSizeY: 1 / h,
    read: createFBO(w, h, internalFormat, format, type, filter),
    write: createFBO(w, h, internalFormat, format, type, filter),
    swap() { const t = this.read; this.read = this.write; this.write = t; },
  };
}

function getResolution(resolution) {
  const aspect = canvas.width / canvas.height;
  const min = Math.round(resolution);
  const max = Math.round(resolution * Math.max(aspect, 1 / aspect));
  return aspect > 1 ? { width: max, height: min } : { width: min, height: max };
}

let dye, velocity, divergence, curl, pressure;

function initFramebuffers() {
  const simRes = getResolution(config.SIM_RESOLUTION);
  const dyeRes = getResolution(config.DYE_RESOLUTION);
  dye = createDoubleFBO(dyeRes.width, dyeRes.height, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, gl.LINEAR);
  velocity = createDoubleFBO(simRes.width, simRes.height, gl.RG16F, gl.RG, gl.HALF_FLOAT, gl.LINEAR);
  divergence = createFBO(simRes.width, simRes.height, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.NEAREST);
  curl = createFBO(simRes.width, simRes.height, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.NEAREST);
  pressure = createDoubleFBO(simRes.width, simRes.height, gl.R16F, gl.RED, gl.HALF_FLOAT, gl.NEAREST);
}
initFramebuffers();

// ---------------------------------------------------------------- particles

const PARTICLE_TEX_W = 2048;
const PARTICLE_TEX_H = 1024;
const PARTICLE_COUNT = PARTICLE_TEX_W * PARTICLE_TEX_H; // 2,097,152

function createParticleFBO(data) {
  const texture = gl.createTexture();
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA32F, PARTICLE_TEX_W, PARTICLE_TEX_H, 0, gl.RGBA, gl.FLOAT, data);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
  return {
    texture, fbo, width: PARTICLE_TEX_W, height: PARTICLE_TEX_H,
    attach(unit) {
      gl.activeTexture(gl.TEXTURE0 + unit);
      gl.bindTexture(gl.TEXTURE_2D, texture);
      return unit;
    },
  };
}

const particles = (() => {
  const data = new Float32Array(PARTICLE_COUNT * 4);
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    data[i * 4] = Math.random();          // x
    data[i * 4 + 1] = Math.random();      // y
    data[i * 4 + 2] = Math.random() * 6;  // age (staggered so respawns don't sync)
    data[i * 4 + 3] = Math.random();      // seed
  }
  return {
    read: createParticleFBO(data),
    write: createParticleFBO(null),
    swap() { const t = this.read; this.read = this.write; this.write = t; },
  };
})();

// attribute-less VAO: the vertex shader derives everything from gl_VertexID
const particleVao = gl.createVertexArray();

function updateParticles(dt, time) {
  gl.disable(gl.BLEND);
  particleUpdateProgram.bind();
  gl.uniform2f(particleUpdateProgram.uniforms.texelSize, 1 / PARTICLE_TEX_W, 1 / PARTICLE_TEX_H);
  gl.uniform1i(particleUpdateProgram.uniforms.uParticles, particles.read.attach(0));
  gl.uniform1i(particleUpdateProgram.uniforms.uVelocity, velocity.read.attach(1));
  gl.uniform2f(particleUpdateProgram.uniforms.uVelTexel, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1f(particleUpdateProgram.uniforms.dt, dt);
  gl.uniform1f(particleUpdateProgram.uniforms.time, time % 1000);
  blit(particles.write);
  particles.swap();
}

function renderParticles() {
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  particleRenderProgram.bind();
  gl.uniform1i(particleRenderProgram.uniforms.uParticles, particles.read.attach(0));
  gl.uniform1i(particleRenderProgram.uniforms.uDye, dye.read.attach(1));
  gl.uniform1i(particleRenderProgram.uniforms.uTexWidth, PARTICLE_TEX_W);
  gl.uniform1f(particleRenderProgram.uniforms.uPointSize, Math.max(1, canvas.width / 1500));
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.bindVertexArray(particleVao);
  gl.drawArrays(gl.POINTS, 0, PARTICLE_COUNT);
  gl.bindVertexArray(quadVao);
  gl.disable(gl.BLEND);
}

// ---------------------------------------------------------------- colors & splats

function HSVtoRGB(h, s, v) {
  const i = Math.floor(h * 6);
  const f = h * 6 - i;
  const p = v * (1 - s);
  const q = v * (1 - f * s);
  const t = v * (1 - (1 - f) * s);
  switch (i % 6) {
    case 0: return [v, t, p];
    case 1: return [q, v, p];
    case 2: return [p, v, t];
    case 3: return [p, q, v];
    case 4: return [t, p, v];
    default: return [v, p, q];
  }
}

let hue = Math.random();
function nextColor() {
  hue = (hue + 0.045) % 1;
  const [r, g, b] = HSVtoRGB(hue, 1.0, 1.0);
  return [r * 0.18, g * 0.18, b * 0.18];
}

function correctRadius(radius) {
  const aspect = canvas.width / canvas.height;
  return aspect > 1 ? radius * aspect : radius;
}

function splat(x, y, dx, dy, color) {
  splatProgram.bind();
  gl.uniform2f(splatProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(splatProgram.uniforms.uTarget, velocity.read.attach(0));
  gl.uniform1f(splatProgram.uniforms.aspectRatio, canvas.width / canvas.height);
  gl.uniform2f(splatProgram.uniforms.point, x, y);
  gl.uniform3f(splatProgram.uniforms.color, dx, dy, 0);
  gl.uniform1f(splatProgram.uniforms.radius, correctRadius(config.SPLAT_RADIUS / 100));
  blit(velocity.write);
  velocity.swap();

  gl.uniform1i(splatProgram.uniforms.uTarget, dye.read.attach(0));
  gl.uniform3f(splatProgram.uniforms.color, color[0], color[1], color[2]);
  blit(dye.write);
  dye.swap();
}

function randomSplats(amount) {
  for (let i = 0; i < amount; i++) {
    const color = nextColor().map(c => c * 8);
    const x = 0.15 + 0.7 * Math.random();
    const y = 0.15 + 0.7 * Math.random();
    const dx = 900 * (Math.random() - 0.5);
    const dy = 900 * (Math.random() - 0.5);
    splat(x, y, dx, dy, color);
  }
}

// ---------------------------------------------------------------- simulation step

function step(dt) {
  gl.disable(gl.BLEND);

  curlProgram.bind();
  gl.uniform2f(curlProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(curlProgram.uniforms.uVelocity, velocity.read.attach(0));
  blit(curl);

  vorticityProgram.bind();
  gl.uniform2f(vorticityProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(vorticityProgram.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(vorticityProgram.uniforms.uCurl, curl.attach(1));
  gl.uniform1f(vorticityProgram.uniforms.curl, config.CURL);
  gl.uniform1f(vorticityProgram.uniforms.dt, dt);
  blit(velocity.write);
  velocity.swap();

  divergenceProgram.bind();
  gl.uniform2f(divergenceProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(divergenceProgram.uniforms.uVelocity, velocity.read.attach(0));
  blit(divergence);

  clearProgram.bind();
  gl.uniform2f(clearProgram.uniforms.texelSize, pressure.texelSizeX, pressure.texelSizeY);
  gl.uniform1i(clearProgram.uniforms.uTexture, pressure.read.attach(0));
  gl.uniform1f(clearProgram.uniforms.value, config.PRESSURE);
  blit(pressure.write);
  pressure.swap();

  pressureProgram.bind();
  gl.uniform2f(pressureProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(pressureProgram.uniforms.uDivergence, divergence.attach(0));
  for (let i = 0; i < config.PRESSURE_ITERATIONS; i++) {
    gl.uniform1i(pressureProgram.uniforms.uPressure, pressure.read.attach(1));
    blit(pressure.write);
    pressure.swap();
  }

  gradientSubtractProgram.bind();
  gl.uniform2f(gradientSubtractProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(gradientSubtractProgram.uniforms.uPressure, pressure.read.attach(0));
  gl.uniform1i(gradientSubtractProgram.uniforms.uVelocity, velocity.read.attach(1));
  blit(velocity.write);
  velocity.swap();

  advectionProgram.bind();
  gl.uniform2f(advectionProgram.uniforms.texelSize, velocity.texelSizeX, velocity.texelSizeY);
  gl.uniform1i(advectionProgram.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(advectionProgram.uniforms.uSource, velocity.read.attach(0));
  gl.uniform1f(advectionProgram.uniforms.dt, dt);
  gl.uniform1f(advectionProgram.uniforms.dissipation, config.VELOCITY_DISSIPATION);
  blit(velocity.write);
  velocity.swap();

  gl.uniform1i(advectionProgram.uniforms.uVelocity, velocity.read.attach(0));
  gl.uniform1i(advectionProgram.uniforms.uSource, dye.read.attach(1));
  gl.uniform1f(advectionProgram.uniforms.dissipation, config.DENSITY_DISSIPATION);
  blit(dye.write);
  dye.swap();
}

function render() {
  displayProgram.bind();
  gl.uniform2f(displayProgram.uniforms.texelSize, 1 / canvas.width, 1 / canvas.height);
  gl.uniform1i(displayProgram.uniforms.uTexture, dye.read.attach(0));
  blit(null);
}

// ---------------------------------------------------------------- input

const pointer = { x: 0.5, y: 0.5, prevX: 0.5, prevY: 0.5, moved: false, color: nextColor() };
let lastInteraction = 0;

function updatePointer(clientX, clientY) {
  pointer.prevX = pointer.x;
  pointer.prevY = pointer.y;
  pointer.x = clientX / canvas.clientWidth;
  pointer.y = 1 - clientY / canvas.clientHeight;
  pointer.moved = true;
  lastInteraction = performance.now() / 1000;
}

window.addEventListener('pointermove', e => updatePointer(e.clientX, e.clientY));
window.addEventListener('pointerdown', e => {
  updatePointer(e.clientX, e.clientY);
  pointer.prevX = pointer.x;
  pointer.prevY = pointer.y;
  const burst = 5 + Math.floor(Math.random() * 3);
  for (let i = 0; i < burst; i++) {
    const color = nextColor().map(c => c * 10);
    const angle = Math.random() * Math.PI * 2;
    const force = 400 + Math.random() * 800;
    splat(pointer.x, pointer.y, Math.cos(angle) * force, Math.sin(angle) * force, color);
  }
});
window.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// hide the HUD after a while
setTimeout(() => document.getElementById('hud').classList.add('faded'), 9000);

// ---------------------------------------------------------------- sound reactive

const soundBtn = document.getElementById('soundBtn');
let audio = null;
let audioState = 'off'; // off | on | muted | blocked

async function enableSound() {
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
  });
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 1024;
  analyser.smoothingTimeConstant = 0.7;
  ctx.createMediaStreamSource(stream).connect(analyser);
  const BANDS = 24;
  audio = {
    ctx, analyser,
    data: new Uint8Array(analyser.frequencyBinCount),
    BANDS,
    smooth: new Float32Array(BANDS), // fast follower per band
    base: new Float32Array(BANDS),   // slow baseline per band
    bassAvg: 0.05,
    beatCooldown: 0,
    hueShift: 0,
  };
}

soundBtn.addEventListener('click', async () => {
  if (audioState === 'off' || audioState === 'blocked') {
    soundBtn.textContent = '🎤 requesting mic…';
    try {
      if (!audio) await enableSound();
      await audio.ctx.resume();
      audioState = 'on';
      soundBtn.textContent = '🎤 sound reactive: on';
      soundBtn.classList.add('active');
    } catch (e) {
      audioState = 'blocked';
      soundBtn.textContent = '🎤 mic blocked — check permissions';
    }
  } else if (audioState === 'on') {
    audio.ctx.suspend();
    audioState = 'muted';
    soundBtn.textContent = '🎤 sound reactive: off';
    soundBtn.classList.remove('active');
  } else {
    await audio.ctx.resume();
    audioState = 'on';
    soundBtn.textContent = '🎤 sound reactive: on';
    soundBtn.classList.add('active');
  }
});

function processAudio(dt) {
  const { analyser, data, BANDS, smooth, base } = audio;
  analyser.getByteFrequencyData(data);
  const usable = Math.floor(data.length * 0.7); // top of the FFT is mostly empty
  const per = Math.max(1, Math.floor(usable / BANDS));
  audio.hueShift = (audio.hueShift + dt * 0.02) % 1;

  // per-band onset = fast follower rising above its slow baseline
  const onsets = [];
  for (let b = 0; b < BANDS; b++) {
    let sum = 0;
    for (let i = b * per, end = i + per; i < end; i++) sum += data[i];
    const energy = sum / (per * 255);
    smooth[b] += (energy - smooth[b]) * 0.5;
    base[b] += (smooth[b] - base[b]) * 0.04;
    const onset = smooth[b] - base[b];
    if (onset > 0.06) onsets.push([onset, b]);
  }
  onsets.sort((p, q) => q[0] - p[0]);

  // strongest bands fire jets from the bottom: bass left, treble right
  for (let i = 0; i < Math.min(onsets.length, 3); i++) {
    const [onset, b] = onsets[i];
    const strength = Math.min(onset * 3, 1);
    const x = (b + 0.2 + 0.6 * Math.random()) / BANDS;
    const hue = (b / BANDS * 0.85 + audio.hueShift) % 1;
    const [r, g, bl] = HSVtoRGB(hue, 1, 1);
    const c = 0.05 + 0.45 * strength;
    splat(x, 0.08 + 0.05 * Math.random(),
          400 * (Math.random() - 0.5),
          1200 + 4500 * strength,
          [r * c, g * c, bl * c]);
  }

  // beat detection on the low bands -> radial burst
  const bass = (smooth[0] + smooth[1] + smooth[2]) / 3;
  audio.bassAvg += (bass - audio.bassAvg) * 0.02;
  audio.beatCooldown -= dt;
  if (bass > 0.22 && bass > audio.bassAvg * 1.35 && audio.beatCooldown <= 0) {
    audio.beatCooldown = 0.22;
    const cx = 0.35 + 0.3 * Math.random();
    const cy = 0.35 + 0.3 * Math.random();
    const kick = Math.min((bass - audio.bassAvg) * 4, 1.5);
    for (let i = 0; i < 6; i++) {
      const ang = (i / 6) * Math.PI * 2 + Math.random();
      const col = nextColor().map(v => v * (6 + 10 * kick));
      splat(cx, cy, Math.cos(ang) * 3000 * kick, Math.sin(ang) * 3000 * kick, col);
    }
  }
}

// ---------------------------------------------------------------- main loop

let lastTime = performance.now() / 1000;
let idleTimer = 0;
let colorTimer = 0;

randomSplats(10);

function frame() {
  const now = performance.now() / 1000;
  const rawDt = now - lastTime;
  let dt = Math.min(rawDt, 1 / 30);
  lastTime = now;

  if (resizeCanvas()) initFramebuffers();

  colorTimer += dt;
  if (colorTimer > 0.12) {
    colorTimer = 0;
    pointer.color = nextColor();
  }

  if (pointer.moved) {
    pointer.moved = false;
    const dx = (pointer.x - pointer.prevX) * config.SPLAT_FORCE;
    const dy = (pointer.y - pointer.prevY) * config.SPLAT_FORCE;
    if (Math.abs(dx) > 0.01 || Math.abs(dy) > 0.01) {
      splat(pointer.x, pointer.y, dx, dy, pointer.color);
    }
  }

  if (audio && audioState === 'on') processAudio(dt);

  // ambient life when idle (the music takes over when sound mode is on)
  idleTimer += dt;
  if (idleTimer > config.IDLE_SPLAT_INTERVAL && now - lastInteraction > 3.5 && audioState !== 'on') {
    idleTimer = 0;
    randomSplats(1 + Math.floor(Math.random() * 2));
  }

  step(dt);
  updateParticles(dt, now);
  render();
  renderParticles();
  updateStats(rawDt);
}

// ---------------------------------------------------------------- stats readout

const statsEl = document.getElementById('stats');
let fpsSmoothed = 60;
let statsTimer = 0;
function updateStats(dt) {
  fpsSmoothed += (1 / Math.max(dt, 1e-4) - fpsSmoothed) * 0.05;
  statsTimer += dt;
  if (statsTimer > 0.5) {
    statsTimer = 0;
    statsEl.textContent = `${PARTICLE_COUNT.toLocaleString('en-US')} particles · ${Math.round(fpsSmoothed)} fps`;
  }
}

// Hybrid scheduler: requestAnimationFrame when the tab is visible, with a
// setTimeout fallback so the simulation keeps flowing when rAF is throttled
// (hidden/embedded tabs). Whichever fires first runs the frame.
let rafId = 0, timeoutId = 0;
function tick() {
  cancelAnimationFrame(rafId);
  clearTimeout(timeoutId);
  frame();
  rafId = requestAnimationFrame(tick);
  timeoutId = setTimeout(tick, 33);
}
tick();
</script>
</body>
